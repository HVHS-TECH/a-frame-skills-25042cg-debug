<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>
            <a-torus-knot color="white" position="2 0 -10" 
            animation="property: p; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;" 
            animation="property: q; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;"
            ></a-torus-knot>
            <a-torus-knot color="white" position="1 0 -10" 
            animation="property: p; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;" 
            animation="property: q; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;"
            ></a-torus-knot>
            <a-torus-knot color="white" position="0 0 -10" 
            animation="property: p; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;" 
            animation="property: q; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;"
            ></a-torus-knot>
            <a-torus-knot color="white" position="-1 0 -10" 
            animation="property: p; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;" 
            animation="property: q; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;"
            ></a-torus-knot>
            <a-torus-knot color="white" position="-2 0 -10" 
            animation="property: p; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;" 
            animation="property: q; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;"
            ></a-torus-knot>
            <a-torus-knot color="white" position="-3 0 -10" 
            animation="property: p; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;" 
            animation="property: q; from: 3; to: 100; dur: 30000; loop: true; dir: alternate;"
            ></a-torus-knot>
            <a-box color="rgb(0,0,0)" position="4 0 -10" scale="2.5 2.5 1"
            animation="property: color; from: rgb(0,0,0); to: rgb(250,9,60); dur: 30000; loop: true; dir: alternate;"
            ></a-box>

        </a-scene>
    </body>
</html>
