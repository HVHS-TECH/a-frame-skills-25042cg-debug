<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
            <a-sphere position="9 0 -10" color="red" ></a-sphere>
            <a-sphere position="8 1 -10" color="orange" ></a-sphere>
            <a-sphere position="7 2 -10" color="yellow" ></a-sphere>
            <a-sphere position="6 3 -10" color="limegreen" ></a-sphere>
            <a-sphere position="5 4 -10" color="green" ></a-sphere>
            <a-sphere position="4 4 -10" color="lightblue" ></a-sphere>
            <a-sphere position="3 3 -10" color="blue" ></a-sphere>
            <a-sphere position="2 2 -10" color="purple" ></a-sphere>
            <a-sphere position="1 1 -10" color="magenta" ></a-sphere>
            <a-sphere position="0 0 -10" color="pink" ></a-sphere>
            <a-pentagonal-trapezohedron position="10 10 10" color="black"></a-pentagonal-trapezohedron>
        </a-scene>
    </body>
</html>
