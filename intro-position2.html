<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
            <a-sphere position="0 9 -10" color="red" ></a-sphere>
            <a-sphere position="0 8 -10" color="orange" ></a-sphere>
            <a-sphere position="0 7 -10" color="yellow" ></a-sphere>
            <a-sphere position="0 6 -10" color="limegreen" ></a-sphere>
            <a-sphere position="0 5 -10" color="green" ></a-sphere>
            <a-sphere position="0 4 -10" color="lightblue" ></a-sphere>
            <a-sphere position="0 3 -10" color="blue" ></a-sphere>
            <a-sphere position="0 2 -10" color="purple" ></a-sphere>
            <a-sphere position="0 1 -10" color="magenta" ></a-sphere>
            <a-sphere position="0 0 -10" color="pink" ></a-sphere>
            <a-cone position="0 -1 -10" color="beige" ></a-sphere>
        </a-scene>
    </body>
</html>
